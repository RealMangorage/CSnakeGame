name: Build Snake Game

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # This runs two parallel builds: one for Windows, one for Linux
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # These are standard build tools and X11/Wayland libs for SDL3
          sudo apt-get install -y build-essential libx11-dev libxcursor-dev libxinerama-dev libxrandr-dev libxi-dev libxss-dev libgl1-mesa-dev libdbus-1-dev libudev-dev libgles2-mesa-dev libwayland-dev liblibxkbcommon-dev

      - name: Configure CMake
        # We use -B build to put build files in a separate 'build' folder
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        run: cmake --build build --config Release