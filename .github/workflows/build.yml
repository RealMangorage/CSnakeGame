name: Build Snake Game

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential \
            libx11-dev libxcursor-dev libxinerama-dev libxrandr-dev \
            libxi-dev libxss-dev libxtst-dev libgl1-mesa-dev libdbus-1-dev \
            libudev-dev libgles2-mesa-dev libwayland-dev libxkbcommon-dev \
            libasound2-dev libpulse-dev

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        run: cmake --build build --config Release

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snake-game-${{ matrix.os }}
          path: |
            # Windows outputs
            build/Release/CSnakeGame.exe
            build/Release/SDL3.dll
            # Linux outputs (Binary and Shared Object)
            build/CSnakeGame
            build/libSDL3.so*
          if-no-files-found: ignore