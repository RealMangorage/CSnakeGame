name: Build Snake Game

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Runs parallel builds for Windows and Linux
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential \
            libx11-dev libxcursor-dev libxinerama-dev libxrandr-dev \
            libxi-dev libxss-dev libxtst-dev libgl1-mesa-dev libdbus-1-dev \
            libudev-dev libgles2-mesa-dev libwayland-dev libxkbcommon-dev \
            libasound2-dev libpulse-dev

      - name: Configure CMake
        # Creates the build directory and configures the project for Release
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        # Compiles the project
        run: cmake --build build --config Release

      - name: Upload Build Artifacts
        # This saves the .exe (Windows) or binary (Linux) so you can download it
        uses: actions/upload-artifact@v4
        with:
          name: snake-game-${{ matrix.os }}
          path: |
            build/CSnakeGame*
            build/*.dll