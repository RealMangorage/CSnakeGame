name: Build and Release Snake Game

on:
  push:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential \
            libx11-dev libxcursor-dev libxinerama-dev libxrandr-dev \
            libxi-dev libxss-dev libxtst-dev libgl1-mesa-dev libdbus-1-dev \
            libudev-dev libgles2-mesa-dev libwayland-dev libxkbcommon-dev \
            libasound2-dev libpulse-dev

      # --- CACHING STEP ---
      - name: Cache SDL3 Build
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
            build/SDL3
          # This key ensures that if you change CMakeLists.txt, the cache resets
          key: ${{ runner.os }}-sdl3-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-sdl3-

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        run: cmake --build build --config Release

      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir -p release-files
          if [ "${{ runner.os }}" == "Windows" ]; then
            cp build/Release/CSnakeGame.exe release-files/
            cd release-files && 7z a ../snake-game-windows.zip *
          else
            cp build/CSnakeGame release-files/
            cd release-files && zip -r ../snake-game-linux.zip .
          fi

      - name: Upload to Latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build (Auto-generated)"
          body: "This release is updated automatically on every push to master."
          files: |
            snake-game-windows.zip
            snake-game-linux.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}